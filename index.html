<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#dff4ea" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/jucart-180.png" />
    <style>
      html,
      body {
        background: #f4f6f5;
      }

      body {
        margin: 0;
      }

      .initial-shell {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #10231f;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .initial-shell__panel {
        width: min(100%, 360px);
      }

      .initial-shell__title {
        margin: 0 0 8px;
        font-size: 2rem;
        line-height: 1;
      }

      .initial-shell__text {
        margin: 0;
        color: #475569;
        font-size: 1rem;
      }
    </style>
    <title>Jucart</title>
  </head>
  <body>
    <div id="root">
      <main class="initial-shell" aria-label="Jucart">
        <div class="initial-shell__panel" role="status" aria-live="polite">
          <h1 class="initial-shell__title">Jucart</h1>
          <p class="initial-shell__text">Cargando lista...</p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
